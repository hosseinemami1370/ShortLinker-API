version: '3.9'

services:
  api:
    build: .
    ports:
      - '8080:8080'
    env_file:
      - .env
    depends_on:
      - postgres

  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: shortlinker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'